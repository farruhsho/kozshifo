<!DOCTYPE html>
<!--
  KO'Z SHIFO — standalone TV queue board (single self-contained file).

  Primary use: served by the backend at  GET /tv/{branch_id}  — open that URL
  in any TV browser, press fullscreen, done. Polls the public privacy-safe
  endpoint /api/v1/queue/tv-board/{branch_id} every 4 seconds.

  Overrides (also lets the file run when opened from disk):
    ?branch=<uuid>   branch id (otherwise taken from the /tv/{id} path)
    ?api=<base>      API origin, e.g. http://192.168.1.10:8000 (default: same origin)
-->
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KO'Z SHIFO — Навбат / Очередь</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111c30;
    --accent: #2dd4bf;
    --accent-soft: rgba(45, 212, 191, 0.12);
    --text: #e8eef7;
    --muted: #8fa3bf;
    --called: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2vh 2.5vw;
    border-bottom: 2px solid var(--accent-soft);
  }
  .brand { display: flex; align-items: center; gap: 1vw; }
  .brand .eye { font-size: 4vh; }
  .brand h1 { font-size: 3.6vh; letter-spacing: 0.06em; }
  .brand h1 span { color: var(--accent); }
  #clock { font-size: 4.2vh; font-variant-numeric: tabular-nums; color: var(--muted); }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 58% 42%;
    gap: 1.5vh;
    padding: 1.5vh;
    min-height: 0;
  }
  section {
    background: var(--panel);
    border-radius: 1.2vh;
    padding: 1.6vh 1.8vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  section h2 {
    font-size: 2.8vh;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1.2vh;
  }
  #serving { display: flex; flex-direction: column; gap: 1.2vh; overflow: hidden; }
  .serve-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-soft);
    border-left: 0.6vh solid var(--accent);
    border-radius: 1vh;
    padding: 1.6vh 1.5vw;
  }
  .serve-row.called { border-left-color: var(--called); animation: blink 1.2s ease-in-out 6; }
  @keyframes blink { 50% { background: rgba(251, 191, 36, 0.22); } }
  .serve-row .ticket { font-size: 7.5vh; font-weight: 800; font-variant-numeric: tabular-nums; }
  .serve-row .label { font-size: 3vh; color: var(--muted); }
  .serve-row .room { font-size: 5vh; font-weight: 700; color: var(--accent); text-align: right; }
  .serve-row.called .room { color: var(--called); }
  .room .room-hint { display: block; font-size: 2vh; font-weight: 400; color: var(--muted); }
  #waiting { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2vh; align-content: start; overflow: hidden; }
  .wait-cell {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 1vh;
    text-align: center;
    padding: 1.6vh 0.4vw;
  }
  .wait-cell .ticket { font-size: 4.6vh; font-weight: 700; font-variant-numeric: tabular-nums; }
  .wait-cell .label { font-size: 2vh; color: var(--muted); }
  .empty { color: var(--muted); font-size: 3vh; padding: 2vh 0; }
  footer {
    display: flex;
    justify-content: space-between;
    padding: 0.8vh 2.5vw;
    font-size: 2vh;
    color: var(--muted);
    border-top: 2px solid var(--accent-soft);
  }
  #status.offline { color: #f87171; }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="eye">👁</span><h1>KO'Z <span>SHIFO</span></h1></div>
    <div id="clock">--:--</div>
  </header>
  <main>
    <section>
      <h2>Хозир қабулда · Сейчас принимаются</h2>
      <div id="serving"><div class="empty">—</div></div>
    </section>
    <section>
      <h2>Навбат · Очередь</h2>
      <div id="waiting"><div class="empty">—</div></div>
    </section>
  </main>
  <footer>
    <span>Чакирилгунча кутинг · Ожидайте вызова</span>
    <span id="status">…</span>
  </footer>

<script>
(function () {
  'use strict';

  var params = new URLSearchParams(location.search);
  var pathMatch = location.pathname.match(/\/tv\/([0-9a-fA-F-]{36})/);
  var BRANCH = params.get('branch') || (pathMatch ? pathMatch[1] : null);
  var API = (params.get('api') || location.origin).replace(/\/+$/, '');
  var POLL_MS = 4000;
  var lastCalled = {};   // ticket_number -> first time we saw it "called"

  var servingEl = document.getElementById('serving');
  var waitingEl = document.getElementById('waiting');
  var statusEl = document.getElementById('status');
  var clockEl = document.getElementById('clock');

  function tickClock() {
    var d = new Date();
    clockEl.textContent =
      String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  tickClock();
  setInterval(tickClock, 10000);

  if (!BRANCH) {
    statusEl.textContent = 'branch не задан: откройте /tv/{branch_id} или добавьте ?branch=<uuid>';
    statusEl.className = 'offline';
    return;
  }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined) n.textContent = text;
    return n;
  }

  function renderServing(rows) {
    servingEl.innerHTML = '';
    if (!rows.length) {
      servingEl.appendChild(el('div', 'empty', 'Ҳозирча бўш · Пока никого'));
      return;
    }
    rows.slice(0, 5).forEach(function (t) {
      var isNewCall = t.status === 'called' && !lastCalled[t.ticket_number];
      if (t.status === 'called') lastCalled[t.ticket_number] = true;
      var row = el('div', 'serve-row' + (t.status === 'called' ? ' called' : ''));
      var left = el('div');
      left.appendChild(el('div', 'ticket', t.ticket_number));
      left.appendChild(el('div', 'label', t.patient_label));
      var room = el('div', 'room', t.room || '');
      room.appendChild(el('span', 'room-hint',
        t.status === 'called' ? 'киринг · пройдите' : 'қабулда · на приёме'));
      row.appendChild(left);
      row.appendChild(room);
      servingEl.appendChild(row);
      if (isNewCall) row.scrollIntoView({ block: 'nearest' });
    });
  }

  function renderWaiting(rows) {
    waitingEl.innerHTML = '';
    if (!rows.length) {
      waitingEl.appendChild(el('div', 'empty', 'Навбат бўш · Очередь пуста'));
      return;
    }
    rows.slice(0, 12).forEach(function (t) {
      var cell = el('div', 'wait-cell');
      cell.appendChild(el('div', 'ticket', t.ticket_number));
      cell.appendChild(el('div', 'label', t.patient_label));
      waitingEl.appendChild(cell);
    });
  }

  function poll() {
    fetch(API + '/api/v1/queue/tv-board/' + BRANCH, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (board) {
        renderServing(board.now_serving || []);
        renderWaiting(board.waiting || []);
        statusEl.textContent = 'online';
        statusEl.className = '';
      })
      .catch(function (e) {
        statusEl.textContent = 'нет связи с сервером (' + e.message + ')';
        statusEl.className = 'offline';
      });
  }

  poll();
  setInterval(poll, POLL_MS);
})();
</script>
</body>
</html>
