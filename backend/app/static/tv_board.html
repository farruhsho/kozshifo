<!DOCTYPE html>
<!--
  KO'Z SHIFO — standalone TV queue board v3: two-track 2x2 layout.

  LEFT (blue)  = doctor queue   (V-…): top — now called, bottom — next 10.
  RIGHT (green)= diagnostic queue (D-…): same.

  Served at GET /tv/{branch_id}; polls the public privacy-safe
  /api/v1/queue/tv-board/{branch_id} every 4s (ACAO:* — works from file://
  or another host too). Voice + chime on every new call in either track,
  mute toggle persisted, freshness indicator, daily auto-reload.

  Overrides: ?branch=<uuid>  ?api=<origin>
-->
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KO'Z SHIFO — Навбат / Очередь</title>
<style>
  :root {
    --bg: #0b1220;
    --text: #f3f7fd;
    --muted: rgba(243, 247, 253, 0.65);
    --doctor: #1e56b8;
    --doctor-deep: #143e87;
    --diag: #0e7a52;
    --diag-deep: #0a5c3e;
    --called: #ffd54a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1vh 2vw;
  }
  .brand { display: flex; align-items: baseline; gap: 1vw; }
  .brand h1 { font-size: 3.2vh; letter-spacing: 0.06em; }
  .brand h1 span { color: #2dd4bf; }
  #branch { font-size: 2.2vh; color: var(--muted); }
  #clock { font-size: 3.6vh; font-variant-numeric: tabular-nums; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 42% 1fr;
    gap: 0.8vh;
    padding: 0 0.8vh 0.8vh;
    min-height: 0;
  }
  section { border-radius: 1.2vh; padding: 1.4vh 1.4vw; min-height: 0; display: flex; flex-direction: column; }
  .doctor-now   { background: linear-gradient(160deg, var(--doctor), var(--doctor-deep)); }
  .doctor-list  { background: var(--doctor-deep); }
  .diag-now     { background: linear-gradient(160deg, var(--diag), var(--diag-deep)); }
  .diag-list    { background: var(--diag-deep); }

  .now-title {
    font-size: 2.6vh;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .now-ticket {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17vh;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .now-ticket.fresh { color: var(--called); animation: pulse 1.1s ease-in-out 6; }
  @keyframes pulse { 50% { opacity: 0.45; } }
  .now-meta { text-align: center; font-size: 2.8vh; }
  .now-meta .who { color: var(--muted); font-size: 2.3vh; margin-top: 0.4vh; }
  .now-more { text-align: center; font-size: 2.1vh; color: var(--muted); min-height: 2.6vh; margin-top: 0.5vh; }

  .list-title {
    font-size: 2.4vh;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1vh;
    color: var(--muted);
  }
  table { width: 100%; border-collapse: collapse; font-size: 2.7vh; }
  th {
    color: var(--muted);
    font-size: 1.9vh;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: left;
    padding: 0.4vh 0.6vw;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  td { padding: 0.55vh 0.6vw; border-bottom: 1px solid rgba(255,255,255,0.08); }
  td.num { font-weight: 700; font-variant-numeric: tabular-nums; }
  td.idx, th.idx { width: 3ch; color: var(--muted); }
  .empty { color: var(--muted); font-size: 2.6vh; text-align: center; padding: 2vh 0; }

  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2vw;
    padding: 0.7vh 2vw;
    font-size: 2.1vh;
    color: var(--muted);
  }
  #ticker { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status.offline { color: #f87171; }
  #sound {
    background: none; border: 1px solid var(--muted); border-radius: 0.8vh;
    color: var(--muted); font-size: 1.9vh; padding: 0.2vh 0.8vw; cursor: pointer;
  }
  #sound.unlock { border-color: var(--called); color: var(--called); }
</style>
</head>
<body>
  <header>
    <div class="brand"><h1>KO'Z <span>SHIFO</span></h1><div id="branch"></div></div>
    <div id="clock">--:-- · --.--.----</div>
  </header>

  <main>
    <section class="doctor-now">
      <div class="now-title">Сейчас вызывается · Врач</div>
      <div class="now-ticket" id="doc-ticket">—</div>
      <div class="now-meta"><span id="doc-room"></span><div class="who" id="doc-who"></div></div>
      <div class="now-more" id="doc-more"></div>
    </section>
    <section class="diag-now">
      <div class="now-title">Сейчас вызывается · Диагностика</div>
      <div class="now-ticket" id="dia-ticket">—</div>
      <div class="now-meta"><span id="dia-room"></span><div class="who" id="dia-who"></div></div>
      <div class="now-more" id="dia-more"></div>
    </section>
    <section class="doctor-list">
      <div class="list-title">Очередь к врачу</div>
      <div id="doc-list" style="overflow:hidden; flex:1"></div>
    </section>
    <section class="diag-list">
      <div class="list-title">Очередь на диагностику</div>
      <div id="dia-list" style="overflow:hidden; flex:1"></div>
    </section>
  </main>

  <footer>
    <span id="ticker">Чакирилгунча кутинг · Ожидайте вызова</span>
    <span id="status">…</span>
    <button id="sound" type="button">🔊 звук вкл</button>
  </footer>

<script>
(function () {
  'use strict';

  var params = new URLSearchParams(location.search);
  var pathMatch = location.pathname.match(/\/tv\/([0-9a-fA-F-]{36})/);
  var BRANCH = params.get('branch') || (pathMatch ? pathMatch[1] : null);
  var API = (params.get('api') || location.origin).replace(/\/+$/, '');
  var POLL_MS = 4000;
  // 8 строк гарантированно влезают в нижний блок вместе с «+N ещё» (10 строк
  // клиппались, и индикатор переполнения был не виден никогда).
  var LIST_MAX = 8;

  var els = {
    branch: document.getElementById('branch'),
    clock: document.getElementById('clock'),
    ticker: document.getElementById('ticker'),
    status: document.getElementById('status'),
    sound: document.getElementById('sound'),
    doc: { ticket: document.getElementById('doc-ticket'), room: document.getElementById('doc-room'),
           who: document.getElementById('doc-who'), more: document.getElementById('doc-more'),
           list: document.getElementById('doc-list') },
    dia: { ticket: document.getElementById('dia-ticket'), room: document.getElementById('dia-room'),
           who: document.getElementById('dia-who'), more: document.getElementById('dia-more'),
           list: document.getElementById('dia-list') }
  };

  var seenCalled = {};
  var firstPoll = true;
  var lastOkAt = null;
  var freshUntil = { doc: 0, dia: 0 };

  function tickClock() {
    var d = new Date();
    var p = function (n) { return String(n).padStart(2, '0'); };
    els.clock.textContent = p(d.getHours()) + ':' + p(d.getMinutes()) +
      ' · ' + p(d.getDate()) + '.' + p(d.getMonth() + 1) + '.' + d.getFullYear();
  }
  tickClock();
  setInterval(tickClock, 10000);
  setTimeout(function () { location.reload(); }, 24 * 60 * 60 * 1000);

  if (!BRANCH) {
    els.status.textContent = 'branch не задан: /tv/{branch_id} или ?branch=<uuid>';
    els.status.className = 'offline';
    return;
  }

  // ── Звук: гонг + озвучка; mute с памятью ───────────────────────────────────
  var muted = false;
  try { muted = localStorage.getItem('tv_muted') === '1'; } catch (e) { /* ок */ }
  var audioCtx = null;

  function refreshSoundBtn() {
    if (muted) { els.sound.textContent = '🔇 звук выкл'; els.sound.className = ''; }
    else if (audioCtx && audioCtx.state === 'suspended') {
      els.sound.textContent = '🔇 нажмите для звука'; els.sound.className = 'unlock';
    } else { els.sound.textContent = '🔊 звук вкл'; els.sound.className = ''; }
  }
  function ensureAudio() {
    if (!audioCtx && typeof (window.AudioContext || window.webkitAudioContext) !== 'undefined') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    refreshSoundBtn();
  }
  els.sound.addEventListener('click', function () {
    muted = !muted;
    try { localStorage.setItem('tv_muted', muted ? '1' : '0'); } catch (e) { /* ок */ }
    if (!muted) ensureAudio();
    refreshSoundBtn();
  });
  document.addEventListener('click', function () { if (!muted) ensureAudio(); }, { once: true });
  refreshSoundBtn();

  function chime() {
    if (muted) return;
    ensureAudio();
    if (!audioCtx || audioCtx.state !== 'running') return;
    [[880, 0], [659.25, 0.28]].forEach(function (note) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = note[0];
      var t = audioCtx.currentTime + note[1];
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.4, t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.65);
    });
  }

  function speak(phrase) {
    if (muted || typeof speechSynthesis === 'undefined') return;
    try {
      var u = new SpeechSynthesisUtterance(phrase);
      u.lang = 'ru-RU';
      u.rate = 0.9;
      speechSynthesis.speak(u);
    } catch (e) { /* нет голосов — есть гонг */ }
  }

  function announce(ticket, room, who) {
    // Якорим срез нулей к началу числовой части: безанкерный /0+(\d)/ съедал
    // внутренние нули («D-105» озвучивался как «D 15» — чужой талон!).
    var spelled = ticket.replace('-', ' ').replace(/ 0+(?=\d)/, ' ');
    var roomNo = room ? String(room).replace(/\D+/g, '') : '';
    // Имя специалиста добавляется в озвучку только когда оно есть (вызвавший
    // или назначенный по маршруту) — старые талоны без специалиста звучат как раньше.
    var phrase = 'Талон ' + spelled + '.' +
      (who ? ' ' + who + '.' : '') +
      (roomNo ? ' Пройдите в кабинет номер ' + roomNo + '.' : '');
    els.ticker.textContent = '🔔 ' + ticket + (who ? ' · ' + who : '') +
      (room ? ', пройдите в ' + room : '');
    chime();
    speak(phrase);
  }

  // ── Рендер ────────────────────────────────────────────────────────────────
  function hhmm(iso) {
    if (!iso) return '';
    // Бэкенд на SQLite сериализует UTC-времена БЕЗ смещения — JS трактовал бы
    // их как локальные (минус 5 часов в Ташкенте). Голая ISO-строка = UTC.
    if (!/[zZ]$|[+-]\d\d:?\d\d$/.test(iso)) iso += 'Z';
    var d = new Date(iso);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function renderNow(side, key, nowList) {
    var entry = nowList[0] || null;
    if (!entry) {
      side.ticket.textContent = '—';
      side.ticket.className = 'now-ticket';
      side.room.textContent = '';
      side.who.textContent = '';
      side.more.textContent = '';
      return;
    }
    side.ticket.textContent = entry.ticket_number;
    side.ticket.className = 'now-ticket' + (Date.now() < freshUntil[key] ? ' fresh' : '');
    var statusTxt = entry.status === 'serving' ? 'приём начат' : 'вызывается';
    side.room.textContent = (entry.room || '') + (entry.called_at ? ' · ' + hhmm(entry.called_at) : '') +
      ' · ' + statusTxt;
    side.who.textContent = entry.specialist || '';
    // Остальные вызванные/принимаемые не должны исчезать с экрана, когда
    // вызывают следующего: компактная строка под главным номером.
    var rest = nowList.slice(1, 5).map(function (t) {
      return t.ticket_number + (t.room ? ' → ' + t.room : '');
    });
    side.more.textContent = rest.length
      ? 'также: ' + rest.join(' · ') + (nowList.length > 5 ? ' · +' + (nowList.length - 5) : '')
      : '';
  }

  function renderList(container, rows) {
    container.innerHTML = '';
    if (!rows.length) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'Навбат бўш · Очередь пуста';
      container.appendChild(empty);
      return;
    }
    var table = document.createElement('table');
    table.innerHTML = '<thead><tr><th class="idx">№</th><th>Номер</th><th>Кабинет</th><th>Специалист</th></tr></thead>';
    var tbody = document.createElement('tbody');
    rows.slice(0, LIST_MAX).forEach(function (t, i) {
      var tr = document.createElement('tr');
      // «Специалист» = к кому направлен талон (маршрутизация); пусто = общий пул.
      var cells = [
        ['idx', String(i + 1)],
        ['num', t.ticket_number],
        ['', t.room || '—'],
        ['', t.assigned || '—'],
      ];
      cells.forEach(function (c) {
        var td = document.createElement('td');
        if (c[0]) td.className = c[0];
        td.textContent = c[1];
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
    if (rows.length > LIST_MAX) {
      var more = document.createElement('div');
      more.className = 'empty';
      more.textContent = '+' + (rows.length - LIST_MAX) + ' ещё';
      container.appendChild(more);
    }
  }

  function processTrack(trackData, side, key) {
    var now = (trackData && trackData.now) || [];
    var waiting = (trackData && trackData.waiting) || [];
    now.forEach(function (t) {
      if (t.status !== 'called') return;
      // Ключ включает called_at: номера талонов обнуляются каждое утро, и
      // голый номер «заглушал» бы озвучку сегодняшнего D-001 после вчерашнего.
      var seenKey = t.ticket_number + '@' + (t.called_at || '');
      if (!seenCalled[seenKey]) {
        seenCalled[seenKey] = true;
        if (!firstPoll) {
          freshUntil[key] = Date.now() + 8000;
          announce(t.ticket_number, t.room, t.specialist || t.assigned);
        }
      }
    });
    renderNow(side, key, now);
    renderList(side.list, waiting);
  }

  function refreshFreshness() {
    if (lastOkAt === null) return;
    var sec = Math.round((Date.now() - lastOkAt) / 1000);
    if (sec <= POLL_MS / 1000 + 2) {
      els.status.textContent = 'онлайн';
      els.status.className = '';
    } else {
      els.status.textContent = 'нет связи · данные ' + sec + ' с назад';
      els.status.className = 'offline';
    }
  }
  setInterval(refreshFreshness, 1000);

  // ── Самопланирующийся опрос с тайм-аутом ───────────────────────────────────
  function poll() {
    var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    var killer = ctrl && setTimeout(function () { ctrl.abort(); }, POLL_MS);
    var opts = { cache: 'no-store' };
    if (ctrl) opts.signal = ctrl.signal;

    function schedule() {
      if (killer) clearTimeout(killer);
      setTimeout(poll, POLL_MS);
    }

    fetch(API + '/api/v1/queue/tv-board/' + BRANCH, opts)
      .then(function (r) {
        if (r.status === 404) throw new Error('филиал не найден — проверьте ссылку');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (board) {
        if (board.branch_name) els.branch.textContent = board.branch_name;
        processTrack(board.doctor, els.doc, 'doc');
        processTrack(board.diagnostic, els.dia, 'dia');
        firstPoll = false;
        lastOkAt = Date.now();
        refreshFreshness();
        schedule();
      })
      .catch(function (e) {
        if (lastOkAt === null) {
          els.status.textContent = 'нет связи с сервером (' + e.message + ')';
          els.status.className = 'offline';
        }
        refreshFreshness();
        schedule();
      });
  }

  poll();
})();
</script>
</body>
</html>
