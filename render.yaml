# ── Free always-on backend for KO'Z SHIFO ────────────────────────────────────
# A temporary public backend so the Firebase-hosted UI works WITHOUT Blaze,
# until the clinic's own server arrives. Gives a stable HTTPS URL such as
# https://kozshifo-api.onrender.com (CORS already allows the Firebase origin).
#
# Deploy (once, in YOUR Render account — free, GitHub-connected):
#   1. https://dashboard.render.com  →  New +  →  Blueprint
#   2. Connect the GitHub repo  farruhsho/kozshifo
#   3. Render reads this file, creates the web service + a free Postgres DB.
#   4. When it's live, copy the service URL and run from the repo root:
#        ./deploy_firebase.ps1 -ApiBase https://<your-service>.onrender.com
#
# Notes:
#   • Free web services SLEEP after ~15 min idle (first request then takes
#     ~30–60 s to wake). Fine for testing.
#   • The free Postgres instance is free for 30 days, then Render removes it —
#     long enough as a bridge. If your account has no free Postgres, delete the
#     `databases:` block below and the DATABASE_URL var: the app then uses an
#     in-image SQLite that RE-SEEDS on every restart (demo logins always work,
#     but data added during testing resets on sleep/redeploy).
#   • Login after deploy:  director@kozshifo.uz  /  KozShifo!Test2026
services:
  - type: web
    name: kozshifo-api
    runtime: docker
    plan: free
    region: frankfurt
    branch: feat/patient-flow-templates
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Honour Render's injected $PORT (the Dockerfile CMD hardcodes 8000).
    dockerCommand: /bin/sh -c "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true            # Render generates a strong unique value
      - key: SEED_ON_STARTUP
        value: "true"
      - key: SEED_DIRECTOR_PASSWORD
        value: "KozShifo!Test2026"      # test-only; change before any real data
      - key: CORS_ORIGINS
        value: "https://kozshifo-32e6f.web.app,https://kozshifo-32e6f.firebaseapp.com"
      - key: TZ
        value: Asia/Tashkent
      - key: DATABASE_URL
        fromDatabase:
          name: kozshifo-db
          property: connectionString

databases:
  - name: kozshifo-db
    plan: free
    region: frankfurt
